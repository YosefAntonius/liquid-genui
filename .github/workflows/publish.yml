name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag (latest, next, beta)'
        required: false
        default: 'latest'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    environment: pnpm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm run build

      - name: Publish to npm
        run: pnpm publish -r --access public --provenance --tag "${{ inputs.dist-tag }}"